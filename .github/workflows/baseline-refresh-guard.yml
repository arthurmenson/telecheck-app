# Telecheck — baseline-refresh metadata guard
#
# Sprint 13 / TLC-026 fix-forward (Codex perf-bench-r6 + r7 MEDIUM
# closures 2026-05-05). r6: the [scope=baseline-refresh] tag was
# documented as enforcement but only checkable post-merge by grep
# (same control weakness the section claimed to eliminate). r6
# fix-forward (commit 6c9c244) added this workflow with regex grep
# of PR title/body/commit messages. r7 MEDIUM (2 findings) flagged
# that v1 was still inadequate:
#   r7-A: loose regex grep accepts unrelated numbers (timestamps,
#         build IDs) and hex strings — provenance not enforced
#   r7-B: a path-filtered workflow set as a required branch-
#         protection check leaves non-baseline PRs hung on a
#         missing/pending context, blocking unrelated merges
#
# r7 fix-forward (commit 8308dfb):
#   - r7-A: replace loose grep with LABELED FIELDS
#     (`Run-Id: <id>`, `Source-SHA: <sha>`) plus GH API VALIDATION
#     (the run id must exist, must have completed successfully, must
#     be the Performance benchmarks workflow, must have head_sha
#     matching the cited Source-SHA)
#   - r7-B: workflow now triggers on ALL pull_requests (no paths
#     filter); first step early-exits with success when
#     tests/perf/baseline.json is unchanged. The required check is
#     therefore always produced, and Sprint 14+ branch protection
#     can require it without blocking unrelated PRs.
#
# r8 fix-forward (this commit):
#   - r8-A: replace TWO-DOT diff (BASE..HEAD) with TRIPLE-DOT diff
#     (BASE...HEAD, merge-base semantics) so the file list reflects
#     what THIS PR introduces, not the snapshot delta between base
#     tip and head tip. Two-dot would misclassify any unrelated PR
#     after main itself changed tests/perf/baseline.json — the PR
#     head still differs from BASE_SHA for that file even though the
#     PR didn't touch it. Triple-dot diffs against the merge-base
#     of the two tips, which is the correct PR change set.
#   - r8-B: r7-A's labeled-field grep matched substrings anywhere in
#     a line; e.g., 'fooRun-Id: 1234567890' passed the contract.
#     r8-B anchors the regex to FULL LINES (^...[[:space:]]*$) so
#     only deliberate metadata fields on their own line satisfy the
#     check. Sub-extracts the value from the matched line via second
#     grep -oE.
#
# Required metadata (per docs/TLC-023c-BRANCH-PROTECTION-WIRE-UP.md §2.1):
#   1. `[scope=baseline-refresh]` literal tag (anywhere in PR
#      title/body/commit messages)
#   2. `Run-Id: <10+ digit number>` labeled field
#   3. `Source-SHA: <7-40 char lowercase hex>` labeled field
# Plus GH API validation:
#   - The cited run id must exist via /repos/.../actions/runs/{id}
#   - Its `name` must equal "Performance benchmarks"
#   - Its `conclusion` must equal "success"
#   - Its `head_sha` must START WITH the cited Source-SHA (so the
#     short SHA is a valid prefix of the full run head_sha)
#
# Anti-pattern this prevents (Codex perf-bench-r2/r3/r6/r7 finding class):
#   A local-laptop or flaky-run baseline silently committed without
#   provenance. Multi-round adversarial review converged here:
#     r2: local-laptop baseline → revert
#     r3: doc-only churn discipline → revert
#     r6: doc-only enforcement claim → add CI workflow
#     r7-A: loose regex → anchored labeled fields + API validation
#     r7-B: path-filter required-check → always-run + early-exit
#
# Why a separate workflow (not extending perf.yml or ci.yml):
#   - perf.yml's job is bench execution + threshold check; mixing
#     metadata enforcement on a different file path couples concerns
#   - ci.yml runs on every PR but does NOT inspect commit/PR
#     metadata; same coupling concern
#   - Keeps the failure mode visible as a distinct CI check
#     ("Baseline refresh guard / verify-metadata") that branch
#     protection can require independently when Sprint 14+ wires it
#
# Sprint 14+ branch-protection wire-up:
#   gh api -X PUT repos/:owner/:repo/branches/main/protection \
#     --field "required_status_checks[contexts][]=Baseline refresh guard / verify-metadata"
#   This is now safe (per r7-B closure) because the workflow ALWAYS
#   runs on every PR — it just exits early with success when
#   tests/perf/baseline.json is unchanged.
#
# Spec references:
#   - ORT v1.5 OR-218 (Tier 1 launch-blocking)
#   - docs/TLC-023c-BRANCH-PROTECTION-WIRE-UP.md §2.1 (procedure)
#   - tests/perf/README.md §"Baseline.json provenance + scope"

name: Baseline refresh guard

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  actions: read  # required for gh api /actions/runs/{id} validation

jobs:
  verify-metadata:
    name: verify-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR (full history for commit-message inspection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # r7-B closure: workflow runs on every PR; this step early-exits
      # with success when tests/perf/baseline.json is unchanged. Sprint
      # 14+ branch protection can therefore require this check without
      # leaving non-baseline PRs hung on a missing context.
      - name: Detect baseline.json changes (skip-with-success if unchanged)
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # r8-A closure (Codex perf-bench-r8 MEDIUM 2026-05-05):
          # use TRIPLE-DOT diff (merge-base semantics) so the file list
          # reflects what THIS PR introduces, not the snapshot
          # difference between base tip and head tip. Two-dot diff
          # would misclassify any unrelated PR after main itself
          # changed tests/perf/baseline.json — the PR head still
          # differs from BASE_SHA for that file even though the PR
          # didn't touch it. Triple-dot diffs against the merge-base
          # of the two tips, which is the correct PR change set.
          if git diff --name-only "${BASE_SHA}...${HEAD_SHA}" | grep -Fxq 'tests/perf/baseline.json'; then
            echo "baseline_changed=true" >> "$GITHUB_OUTPUT"
            echo "tests/perf/baseline.json changed (triple-dot PR diff); metadata enforcement engaged."
          else
            echo "baseline_changed=false" >> "$GITHUB_OUTPUT"
            echo "tests/perf/baseline.json unchanged in this PR (triple-dot diff vs merge-base); skipping metadata checks (success)."
          fi

      # r7-A closure (refined by r8-B): replace loose regex with
      # FULL-LINE ANCHORED LABELED FIELDS + GH API validation. r7-A
      # closure (commit 8308dfb) used unanchored grep that still
      # matched 'fooRun-Id: 1234567890' anywhere in a line. r8-B
      # closure (this commit) anchors to start-of-line / end-of-line
      # so only deliberate metadata fields on their own line pass —
      # incidental embedded label substrings are rejected.
      - name: Verify baseline-refresh metadata (full-line anchored fields + GH API)
        if: steps.detect.outputs.baseline_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Collect inspection sources: PR title + PR body + every
          # commit message on the PR. Use TRIPLE-DOT range (merge-base
          # semantics) per r8-A closure — same as the detect step
          # above — so the commit list is the PR's commits, not all
          # commits between base tip and head tip.
          COMMIT_MESSAGES="$(git log --format=%B "${BASE_SHA}...${HEAD_SHA}" || true)"
          ALL=$(printf '%s\n%s\n%s\n' "${PR_TITLE}" "${PR_BODY:-}" "${COMMIT_MESSAGES}")

          # ----- Required check 1: [scope=baseline-refresh] literal -----
          if ! printf '%s\n' "$ALL" | grep -F -q '[scope=baseline-refresh]'; then
            echo "::error::baseline.json change is missing [scope=baseline-refresh] tag in PR title/body or commit messages."
            echo "See docs/TLC-023c-BRANCH-PROTECTION-WIRE-UP.md §2.1 for the required commit/PR metadata template."
            exit 1
          fi

          # ----- Required check 2: full-line anchored Run-Id field -----
          # Match a WHOLE LINE that is exactly: optional leading
          # whitespace + 'Run-Id:' (colon required) + optional
          # whitespace + 10+ digits + optional trailing whitespace.
          # Anchors '^' / '$' rule out 'fooRun-Id: 1234567890' and
          # similar incidental embeddings (Codex r8-B closure).
          # Extract the digits from the matched line via second grep.
          RUN_ID_LINE=$(printf '%s\n' "$ALL" | grep -E '^[[:space:]]*[Rr]un-[Ii]d:[[:space:]]*[0-9]{10,}[[:space:]]*$' | head -1 || true)
          if [[ -z "$RUN_ID_LINE" ]]; then
            echo "::error::baseline.json change is missing 'Run-Id: <10+ digit number>' labeled field on its own line in PR title/body or commit messages."
            echo "Required to bind the baseline to a specific CI-runner capture."
            echo "The field must appear on a line of its own (anchored regex per Codex r8-B closure):"
            echo "  Run-Id: 1234567890123"
            echo "Embedded matches like 'fooRun-Id: 123...' or inline references in prose are rejected."
            exit 1
          fi
          RUN_ID=$(printf '%s' "$RUN_ID_LINE" | grep -oE '[0-9]{10,}')

          # ----- Required check 3: full-line anchored Source-SHA field -----
          # Same anchoring as Run-Id; extract the hex value from the
          # matched line.
          SOURCE_SHA_LINE=$(printf '%s\n' "$ALL" | grep -E '^[[:space:]]*[Ss]ource-[Ss][Hh][Aa]:[[:space:]]*[0-9a-f]{7,40}[[:space:]]*$' | head -1 || true)
          if [[ -z "$SOURCE_SHA_LINE" ]]; then
            echo "::error::baseline.json change is missing 'Source-SHA: <7-40 char lowercase hex>' labeled field on its own line in PR title/body or commit messages."
            echo "Required so the baseline's code-state provenance is auditable."
            echo "The field must appear on a line of its own (anchored regex per Codex r8-B closure):"
            echo "  Source-SHA: a1b2c3d"
            echo "Embedded matches in prose are rejected."
            exit 1
          fi
          SOURCE_SHA=$(printf '%s' "$SOURCE_SHA_LINE" | grep -oE '[0-9a-f]{7,40}')

          echo "Full-line anchored fields parsed: Run-Id=${RUN_ID} Source-SHA=${SOURCE_SHA}"

          # ----- Required check 4: GH API validation of the cited run -----
          # Verify: run exists; conclusion=success; workflow=Performance
          # benchmarks; head_sha starts with the cited Source-SHA.
          # gh api fail-fasts with non-zero on missing run.
          RUN_DATA=$(gh api "/repos/${REPO}/actions/runs/${RUN_ID}" --jq '{conclusion, head_sha, name}')
          CONCLUSION=$(printf '%s' "$RUN_DATA" | jq -r '.conclusion')
          RUN_HEAD_SHA=$(printf '%s' "$RUN_DATA" | jq -r '.head_sha')
          WORKFLOW_NAME=$(printf '%s' "$RUN_DATA" | jq -r '.name')

          if [[ "$WORKFLOW_NAME" != "Performance benchmarks" ]]; then
            echo "::error::Run-Id ${RUN_ID} workflow is '${WORKFLOW_NAME}', not 'Performance benchmarks'."
            echo "Baseline must come from the perf.yml workflow, not an unrelated run."
            exit 1
          fi

          if [[ "$CONCLUSION" != "success" ]]; then
            echo "::error::Run-Id ${RUN_ID} conclusion is '${CONCLUSION}', not 'success'."
            echo "Baseline must come from a successful CI run, not flaky/cancelled/failed."
            exit 1
          fi

          # Source-SHA may be a short prefix; require it to prefix-match
          # the run's full head_sha.
          if [[ "${RUN_HEAD_SHA:0:${#SOURCE_SHA}}" != "$SOURCE_SHA" ]]; then
            echo "::error::Run-Id ${RUN_ID} head_sha is '${RUN_HEAD_SHA}'; cited Source-SHA '${SOURCE_SHA}' is not a prefix."
            echo "The baseline must come from the same CI run that captured the source code state cited."
            exit 1
          fi

          echo "OK: baseline.json change validated against GH API."
          echo "  Run-Id ${RUN_ID} exists, completed=success, workflow='Performance benchmarks',"
          echo "  head_sha=${RUN_HEAD_SHA} (prefix-matches cited Source-SHA ${SOURCE_SHA})."
          echo "Sprint 14+ baseline-refresh execution is unblocked when Evans is reachable for the gh api PUT (per TLC-023c §1)."
