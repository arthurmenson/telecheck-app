# Telecheck — main CI workflow
#
# Per Engineering Handoff Build Guide v1.3 §9.4 (CI/CD per ADR-022) and §11 hard rules.
# Gate sequence: format -> lint -> typecheck -> test (with Postgres) -> coverage upload -> openapi:validate.
#
# Postgres service container is required because integration tests run against a real Postgres
# with RLS policies enabled (per tests/README.md and ADR-023).
#
# Action versions: pinned by major version. Bump deliberately in a dedicated PR.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same PR to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token. Bump only if a step requires write access (e.g. coverage comment bot).
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, lint, typecheck, test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: telecheck_ci
          POSTGRES_PASSWORD: telecheck_ci
          POSTGRES_DB: telecheck_test
        ports:
          - 5432:5432
        # Health check ensures Postgres is ready before vitest connects.
        options: >-
          --health-cmd "pg_isready -U telecheck_ci -d telecheck_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      # Integration test DSN — points at the service container above.
      # Per tests/README.md: ephemeral DB seeded with two tenants (Telecheck-US, Telecheck-Ghana)
      # for cross-tenant access tests.
      TEST_DATABASE_URL: postgres://telecheck_ci:telecheck_ci@localhost:5432/telecheck_test
      # src/lib/config.ts validates DATABASE_URL + REDIS_URL at module load time
      # (any test that transitively imports app.ts → tenant-context → config triggers
      # the singleton). Point them at the same Postgres service container plus a
      # syntactically-valid Redis URL — no Redis service is wired in CI yet because
      # no test actually opens a Redis connection (idempotency module is stubbed).
      DATABASE_URL: postgres://telecheck_ci:telecheck_ci@localhost:5432/telecheck_test
      REDIS_URL: redis://localhost:6379
      # NODE_ENV=test gates the audit emitter's in-memory fallback path
      # (src/lib/audit.ts emitAudit) so tests that exercise the emitter without a
      # transaction handle don't trip the production-only "I-003 violation" guard.
      NODE_ENV: "test"
      # Per-tenant KMS dev key. src/lib/kms.ts `deriveTenantKey()` requires a
      # >= 32-char master string in test env; without it every kms.encrypt /
      # kms.decrypt call throws (and ANY test that exercises the layer-3
      # encryption path fails — kms.test.ts directly, plus forms-intake-pause
      # and forms-intake-restore which encrypt resume_state.encrypted_partial_responses
      # under the per-tenant key per ADR-024). Production gate (NODE_ENV !== 'test')
      # in kms.ts ensures this value is NEVER reached in production — it throws
      # before deriveTenantKey is called. Value mirrors .env.example.
      TENANT_KMS_LOCAL_DEV_KEY: dev-only-not-for-production-32-chars
      # Spec-corpus path for tests/contracts/openapi-conformance.test.ts.
      # The conformance test resolves this env var to find Telecheck_OpenAPI_v0_2.md.
      # Without this, the test logs `[openapi-conformance] OpenAPI spec not found
      # at: ...` and silently passes (its early-return on `!specExists()`).
      # Cloning the sibling spec repo and pointing TELECHECK_SPEC_PATH at the
      # bundle directory activates the spec-presence + length assertions.
      TELECHECK_SPEC_PATH: "${{ github.workspace }}/telecheckONE/Telecheck Master Bundle FINAL US REGION BASELINE"
      # Force CI mode in tooling (e.g., disables interactive prompts in any future setup script).
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Clone the spec corpus into a sibling directory so
      # tests/contracts/openapi-conformance.test.ts can resolve
      # Telecheck_OpenAPI_v0_2.md via TELECHECK_SPEC_PATH (set above).
      # Pattern matches .github/workflows/spec-pointer-validation.yml —
      # public clone, no auth required (telecheckONE is public).
      #
      # `continue-on-error: true` preserves the test's existing
      # bootstrap-mode soft-gate posture: if the clone fails (network
      # blip, repo briefly unavailable, future privacy flip without
      # PAT setup), the openapi-conformance test silently skips per
      # its existing `!specExists()` early-return — the same
      # behavior the workflow had before this step was added. When
      # telecheckONE is reliably reachable AND the conformance test
      # has real per-endpoint assertions (currently all it.todo()),
      # remove this `continue-on-error` line to harden the gate.
      - name: Clone spec corpus
        continue-on-error: true
        run: |
          git clone --depth 1 https://github.com/arthurmenson/telecheckONE.git telecheckONE
          ls "telecheckONE/Telecheck Master Bundle FINAL US REGION BASELINE/Telecheck_OpenAPI_v0_2.md" || \
            echo "::warning::OpenAPI spec file missing from cloned bundle (clone may have partially succeeded)"

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Migration encoding guard — DB-free file scan that fails if any migration
      # SQL file begins with a UTF-8 BOM. Runs first (fastest, no deps) because a
      # BOM silently aborts the migration-chain apply in the test step below; this
      # surfaces the defect class in seconds instead of as a confusing mid-suite
      # Postgres syntax error. See scripts/check-migration-bom.mjs for the why.
      - name: Migration encoding guard (no UTF-8 BOM)
        run: npm run check:migration-bom

      # Format check before lint — prettier failures are usually quick fixes;
      # surfacing them first reduces churn on the PR.
      - name: Format check (prettier)
        run: npm run format:check

      - name: Lint (eslint, --max-warnings 0)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      # Provision the `postgres` role in the service container.
      #
      # Migration 047 (R2 MED-1 closure 2026-05-23) pins SECURITY DEFINER
      # function ownership to `OWNER TO postgres` and CHECKs `v_owner_name
      # = 'postgres'` per the locked-search-path security model. Local dev
      # uses postgres:15 with the default `postgres` superuser; GitHub
      # service container uses POSTGRES_USER=telecheck_ci instead, so the
      # role doesn't exist by default — migrations fail at apply time
      # with `role "postgres" does not exist` and every test file appears
      # as FAIL (142 file-level FAILs / 2058 tests SKIPPED / 0 ran).
      #
      # Fix: create the role idempotently before tests run, granting
      # SUPERUSER so it satisfies the migration's owner-ALTER. CI is the
      # only environment that needs this provisioning — local dev + prod
      # already have the role from the postgres image default.
      #
      # Idempotency: the DO block guards against retry (role already
      # exists on a previous workflow rerun within the same container —
      # unlikely with services: { postgres: } but defensive).
      - name: Provision `postgres` role for migration 047 SECURITY DEFINER owner
        env:
          PGPASSWORD: telecheck_ci
        run: |
          psql -h localhost -U telecheck_ci -d telecheck_test -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'postgres') THEN
              CREATE ROLE postgres SUPERUSER;
            END IF;
          END $$;
          SQL

      # Tests run against the Postgres service container.
      # vitest setup applies migrations + seeds two tenants per tests/README.md.
      - name: Test (vitest)
        run: npm run test

      # Coverage report retained as artifact for reviewer inspection.
      # Eventually feeds a coverage gate; for now upload-only.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

      # OpenAPI validation currently a TODO in package.json (echoes a stub).
      # continue-on-error: true is intentional during bootstrap — once the OpenAPI source
      # is wired (swagger-cli validate against ../telecheckONE OpenAPI v0.2), flip this to
      # continue-on-error: false (or remove the line) so the gate hardens.
      - name: OpenAPI validate (soft gate during bootstrap)
        continue-on-error: true
        run: npm run openapi:validate

# --- Secrets / deployment gap ---
# This workflow references no secrets. When deployment workflows are added (post-bootstrap):
#   - AWS_ROLE_TO_ASSUME (OIDC; per ADR-022 cloud posture)
#   - SENTRY_AUTH_TOKEN (release upload)
#   - Per-tenant Secrets Manager ARNs are NOT set as Actions secrets — workloads read them
#     at runtime via their attached IAM role per EHBG §9.6.
# Deployment workflows (build -> staging -> manual approval -> prod) are explicitly out of
# scope for this bootstrap workflow; see EHBG §9.4. Add a separate `deploy.yml` when the
# first deployable slice ships.
