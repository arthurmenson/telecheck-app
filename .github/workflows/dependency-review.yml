# Telecheck — dependency review on PRs.
#
# Runs GitHub's dependency-review-action against the diff. When the
# action runs effectively, it fails the PR on:
#   - High or critical severity vulnerabilities in added/updated dependencies
#   - Dependencies under copyleft licenses incompatible with our proprietary license
#
# Allow/deny lists below are the starting position; tighten as legal review settles.
# The license posture mirrors the proprietary stance in README.md and is consistent
# with EHBG §9.6 (no secrets in code) and the closed-source build posture in ADR-022.
#
# REPO-LEVEL PREREQUISITE (Sprint 34 / 2026-05-08): the
# dependency-review-action requires GitHub's Dependency Graph feature
# to be enabled at the repo level. As of this commit it is NOT enabled
# on `arthurmenson/telecheck-app`, so the action exits with the
# config-error message:
#
#     "Dependency review is not supported on this repository.
#      Please ensure that Dependency graph is enabled, see
#      https://github.com/arthurmenson/telecheck-app/settings/security_analysis"
#
# Until repo-admin enables Dependency Graph, this workflow runs in
# advisory mode (`continue-on-error: true`) so the persistent
# config-error doesn't gate every PR. Once the repo setting is flipped
# the action's actual security/license checks become effective on the
# next push without any further workflow change required.
#
# To enable Dependency Graph: GitHub repo Settings → Code security →
# Dependency graph → Enable. Requires repo-admin permission.

name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # required so the action can comment review summaries on the PR

jobs:
  dependency-review:
    name: Dependency review (security + license)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        # Advisory mode until the repo-level Dependency Graph prereq
        # lands — see header comment block. Remove this line once the
        # repo setting is enabled (the action will then fail PRs on
        # high-severity vulns or denied licenses as designed).
        continue-on-error: true
        uses: actions/dependency-review-action@v5
        with:
          # Block PRs that introduce vulnerabilities at this severity or higher.
          fail-on-severity: high

          # Copyleft licenses incompatible with proprietary distribution.
          # Engineering Lead + Legal review required to add an exception.
          deny-licenses: >-
            AGPL-1.0,
            AGPL-1.0-only,
            AGPL-1.0-or-later,
            AGPL-3.0,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            GPL-2.0,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0,
            GPL-3.0-only,
            GPL-3.0-or-later,
            SSPL-1.0

          # Comment the summary on the PR for reviewer visibility.
          comment-summary-in-pr: on-failure
